{% set name = "cutde" %}
{% set version = "25.7.24" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cutde-{{ version }}.tar.gz
  sha256: 09fcdbac63a43ebfaaf5bb5445cb84df9aac0b63a3f87eb069a70cc68bd15312

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  build:
    - {{ compiler("c") }}
    - {{ compiler("cxx") }}
    - {{ stdlib("c") }}
    - llvm-openmp  # [osx]
    - libgomp  # [linux]
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - pybind11                               # [build_platform != target_platform]

  host:
    - python
    - setuptools
    - setuptools-scm
    - wheel
    - pybind11
    - mako
    - numpy
    - pip
  run:
    - python
    - mako
    - numpy

test:
  imports:
    - cutde
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/tbenthompson/cutde
  summary: 130 million TDEs per second, Python + CUDA TDEs from Nikkhoo and Walter 2015
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - maresb
    - tbenthompson
