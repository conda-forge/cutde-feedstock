{% set name = "cutde" %}
{% set version = "25.7.21" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cutde-{{ version }}.tar.gz
  sha256: b9e8521469653c3cd8cdbc79949c4dc66b26a62d2141a92fdb8394d8dba70b0e

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler("c") }}
    - {{ compiler("cxx") }}
    - {{ stdlib("c") }}
    - llvm-openmp  # [osx]
    - libgomp  # [linux]
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - pybind11                               # [build_platform != target_platform]

  host:
    - python
    - setuptools
    - setuptools-scm
    - wheel
    - pybind11
    - mako
    - numpy
    - pip
  run:
    - python
    - mako
    - pybind11
    # Question: is this actually required, or is it optional?
    - pyproj

test:
  imports:
    - cutde
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/tbenthompson/cutde
  summary: 130 million TDEs per second, Python + CUDA TDEs from Nikkhoo and Walter 2015
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - maresb
    - tbenthompson
